name: Build genainormalizer test app image

on:
  push:
    branches: [main]
    paths:
      - "internal/testbed/integration/genainormalizer/testapp/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (default: latest)"
        required: false
        default: latest

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./internal/testbed/integration/genainormalizer/testapp
          file: ./internal/testbed/integration/genainormalizer/testapp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/dynatrace/dynatrace-otel-collector/genainormalizer-testapp:${{ github.event.inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
