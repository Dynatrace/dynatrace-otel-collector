name: E2E-Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - "docs/**"
      - "**/*.md"
  push:
    branches: [main]

defaults:
  run:
    shell: bash
env:
  KUBECONFIG: /tmp/kube-config-collector-e2e-testing
  # renovate: datasource=golang-version depName=go
  GO_VERSION: "1.26.4"

jobs:
  docker-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/*.sum"

      - name: Install tools
        run: |
          mkdir -p .tools
          make install-tools

      - name: Generate source files
        run: make generate

      - name: Build collector artifact
        shell: bash
        run: |
          echo "Building collector artifact"
          make build

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dynatrace-otel-collector-bin
          path: bin/dynatrace-otel-collector

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push to local registry
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./bin
          file: Dockerfile
          push: false
          load: true
          tags: dynatrace-otel-collector:e2e-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: export image to tar
        run: |
          docker save dynatrace-otel-collector:e2e-test > /tmp/dynatrace-otel-collector.tar

      - name: Upload container image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dynatrace-otel-collector-image
          path: /tmp/dynatrace-otel-collector.tar

      - name: Build journald image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./bin
          file: Dockerfile-journald
          push: false
          load: true
          tags: dynatrace-otel-collector-journald:e2e-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export journald image to tar
        run: |
          docker save dynatrace-otel-collector-journald:e2e-test > /tmp/dynatrace-otel-collector-journald.tar

      - name: Upload journald container image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dynatrace-otel-collector-journald-image
          path: /tmp/dynatrace-otel-collector-journald.tar

  k8s-multinode-matrix:
    strategy:
      fail-fast: false
      matrix:
        usecase:
          - k8scombined
          - prometheus-large-scale
    runs-on: ubuntu-24.04
    needs: docker-build
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup cluster
        uses: ./.github/actions/create-cluster
        with:
          config: "./.github/actions/create-cluster/multi-node.yaml"

      - name: Run e2e tests
        run: |
          cd internal/testbed/integration/${{ matrix.usecase }}
          go test -v --tags=e2e

  k8s-e2e-test-matrix:
    strategy:
      fail-fast: false
      matrix:
        usecase:
          - k8senrichment
          - prometheus
          - zipkin
          - statsd
          - redaction
          - resource-detection
          - netflow
          - self-monitoring
          - self-monitoring-prometheus
          - k8sobjects
          - kubeletstats
          - k8scluster
          - loadbalancing
          - kafka
          - filestorage
    runs-on: ubuntu-24.04
    needs: docker-build
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup cluster
        uses: ./.github/actions/create-cluster

      - name: Run e2e tests
        run: |
          cd internal/testbed/integration/${{ matrix.usecase }}
          go test -v --tags=e2e

  combined-load-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: "Linux-x64-16-64GB-Runner" # Ubuntu 24.04
    needs: docker-build
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup cluster
        uses: ./.github/actions/create-cluster

      - name: Run e2e tests
        run: |
          cd internal/testbed/integration/combinedload
          go test -v --tags=e2e

  helm-install-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: docker-build
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup cluster
        uses: ./.github/actions/create-cluster

      - name: Run helm installation
        env:
          REPOSITORY: "dynatrace-otel-collector"
          TAG: "e2e-test"
        run: |
          ./internal/testbed/scripts/install_dt_collector_helm.sh || exit 1;

  eec-confmap-provider:
    runs-on: ubuntu-24.04
    needs: docker-build
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: "**/*.sum"

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dynatrace-otel-collector-bin
          path: bin

      - run: chmod +x bin/*

      - name: Run e2e tests
        run: |
          cd internal/confmap/provider/eecprovider
          go test -v --tags=e2e

  hostmetrics-e2e-test:
    name: Test Hostmetrics configuraration
    runs-on: ubuntu-24.04
    needs: docker-build
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup cluster
        uses: ./.github/actions/create-cluster

      - name: Download journald image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dynatrace-otel-collector-journald-image
          path: /tmp

      - name: Load journald image into Kind
        run: |
          kind load image-archive /tmp/dynatrace-otel-collector-journald.tar

      - name: Run e2e tests
        run: |
          cd internal/testbed/integration/hostmetrics
          go test -v --tags=e2e

  notify-slack-combined-load-test:
    runs-on: ubuntu-24.04
    needs: [combined-load-test]
    if: failure() && github.event_name == 'push'
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "DT OTel Collector Distro - Combined Load Test Failure"
          SLACK_COLOR: "failure"
          SLACK_USERNAME: "GitHub Actions Notifier"
          SLACK_ICON: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/github.png"

  notify-slack-e2e-tests:
    runs-on: ubuntu-24.04
    needs: [k8s-e2e-test-matrix, eec-confmap-provider, k8s-multinode-matrix, hostmetrics-e2e-test]
    if: failure() && github.event_name == 'push'
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "DT OTel Collector Distro - E2E Test Failure"
          SLACK_COLOR: "failure"
          SLACK_USERNAME: "GitHub Actions Notifier"
          SLACK_ICON: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/github.png"
