receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  gen_ai_normalizer:
    sources:
      - name: openinference

  # gen_ai_normalizer only maps llm.model_name → gen_ai.request.model.
  # Copy it to gen_ai.response.model when the response hasn't overridden it.
  transform/response_model:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["gen_ai.response.model"], attributes["gen_ai.request.model"]) where attributes["gen_ai.request.model"] != nil and attributes["gen_ai.response.model"] == nil

exporters:
  debug:
    verbosity: detailed
  otlp_http/dynatrace:
    endpoint: ${env:DT_ENDPOINT}/api/v2/otlp
    headers:
      Authorization: "Api-Token ${env:DT_API_TOKEN}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [gen_ai_normalizer, transform/response_model]
      exporters: [debug, otlp_http/dynatrace]
