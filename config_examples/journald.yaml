extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  journald:
    directory: /run/log/journal
    priority: info
    start_at: end
    operators:
      # Move (rename) _PID to pid
      - type: move
        from: body._PID
        to: body.pid

      # You can rename multiple fields at once
      - type: move
        from: body._EXE
        to: attributes.process.executable.name

      # Optional: move MESSAGE to a differently named field
      - type: move
        from: body.MESSAGE
        to: body.message

exporters:
  otlp_http:
    endpoint: ${env:DT_ENDPOINT}
    headers:
      Authorization: "Api-Token ${env:API_TOKEN}"

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [journald]
      exporters: [otlp_http]
