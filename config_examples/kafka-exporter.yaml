extensions:
  health_check:
    endpoint: 0.0.0.0:13133

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 100

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  kafka:
    brokers: ["${env:BROKER_ADDRESS}"]
    tls:
      insecure: true
    traces:
    metrics:
    logs:
    sending_queue:
      batch:
        min_size: 500
        flush_timeout: 30s

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter]
      exporters: [kafka]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter]
      exporters: [kafka]
    logs:
      receivers: [otlp]
      processors: [memory_limiter]
      exporters: [kafka]
