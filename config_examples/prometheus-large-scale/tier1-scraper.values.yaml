# Tier 1: Scraper — scrapes Prometheus targets via TA, load-balances to tier 2.
# Deploy with:
#   helm install otel-scraper open-telemetry/opentelemetry-collector \
#     --namespace otel-ta -f tier1-scraper.values.yaml

fullnameOverride: "tiered-scraper"

podAnnotations:
  metrics.dynatrace.com/scrape: "false"

rollout:
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 0
  strategy: RollingUpdate

resources:
  requests:
    cpu: 1
    memory: 2Gi
  limits:
    memory: 2Gi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 24
  targetMemoryUtilizationPercentage: 50
  targetCPUUtilizationPercentage: 70

image:
  repository: ghcr.io/dynatrace/dynatrace-otel-collector/dynatrace-otel-collector
  # renovate: datasource=docker depName=ghcr.io/dynatrace/dynatrace-otel-collector/dynatrace-otel-collector
  tag: 0.52.0
command:
  name: dynatrace-otel-collector

mode: deployment

service:
  enabled: true
  type: ClusterIP

clusterRole:
  create: false

serviceAccount:
  create: false
  name: tiered-otel-scraper

extraEnvsFrom:
  - secretRef:
      name: dynatrace-otelcol-credentials
extraEnvs:
  - name: K8S_SERVICE_NAME
    value: "{{ include \"opentelemetry-collector.fullname\" . }}"
  - name: K8S_CLUSTER_NAME
    value: "tiered-otelcol-ta-test"
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: K8S_POD_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: K8S_NAMESPACE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
  - name: K8S_POD_UID
    valueFrom:
      fieldRef:
        fieldPath: metadata.uid

alternateConfig:
  extensions:
    health_check:
      endpoint: "${env:MY_POD_IP}:13133"

  receivers:
    prometheus:
      config: {}
      target_allocator:
        collector_id: ${K8S_POD_NAME}
        endpoint: http://tiered-allocator-ta
        interval: 15s

  processors:
    # Memory limiter math (with 3GiB memory limit):
    #   hard limit = 95% of 3GiB = 2.85 GiB
    #   spike buffer = 5% of 3GiB = 0.15 GiB
    #   soft limit = (95% - 5%) = 90% of 3GiB = 2.7 GiB
    # Data is refused when memory exceeds the soft limit (2.7 GiB).
    # A lower spike_limit_percentage raises the soft limit, giving more
    # headroom before refusals start during load spikes.
    memory_limiter:
      check_interval: 1s
      limit_percentage: 95
      spike_limit_percentage: 5

    # CR attribution: extract Kubernetes CR kind / namespace / name from the
    # TA-generated job name encoded in service.name
    # (format: serviceMonitor/<namespace>/<name>/<endpoint-index>).
    # Sets dt.cr.kind, dt.cr.namespace, dt.cr.name as resource attributes so
    # the self-monitoring dashboard can filter and group by CR.
    # Only applies to metrics whose service.name matches the TA naming pattern;
    # collector self-monitoring metrics are left unchanged.
    transform/cr_attribution:
      metric_statements:
        - context: resource
          statements:
            - set(attributes["dt.cr.kind"], ExtractPatterns(attributes["service.name"], "^(?P<kind>serviceMonitor|podMonitor|scrapeConfig)/[^/]+/[^/]+")["kind"]) where IsMatch(attributes["service.name"], "^(serviceMonitor|podMonitor|scrapeConfig)/")
            - set(attributes["dt.cr.namespace"], ExtractPatterns(attributes["service.name"], "^[^/]+/(?P<namespace>[^/]+)/[^/]+")["namespace"]) where IsMatch(attributes["service.name"], "^(serviceMonitor|podMonitor|scrapeConfig)/")
            - set(attributes["dt.cr.name"], ExtractPatterns(attributes["service.name"], "^[^/]+/[^/]+/(?P<name>[^/]+)")["name"]) where IsMatch(attributes["service.name"], "^(serviceMonitor|podMonitor|scrapeConfig)/")
            # Extract pod IP from service.instance.id (Prometheus instance label, format: ip:port).
            # Setting k8s.pod.ip allows the gateway's k8s_attributes processor to resolve
            # k8s.pod.name for the scraped target — making per-target dashboard tiles show
            # pod names instead of raw IP:port addresses.
            # Only applies when instance looks like a pod IP:port (not a hostname or service IP).
            - set(attributes["k8s.pod.ip"], ExtractPatterns(attributes["service.instance.id"], "^(?P<ip>[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+):[0-9]+$")["ip"]) where IsMatch(attributes["service.instance.id"], "^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+:[0-9]+$")

  exporters:
    debug:
      verbosity: basic
    load_balancing:
      routing_key: "resource"
      timeout: 10s
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s
      sending_queue:
        enabled: true
        num_consumers: 10
        queue_size: 10000
        batch:
          min_size: 500
          max_size: 5000
          flush_timeout: 10s
      protocol:
        otlp:
          tls:
            insecure: true
          timeout: 10s
      resolver:
        k8s:
          service: "tiered-gateway.otel-ta"
          ports:
            - 4317

  service:
    extensions:
      - health_check
    pipelines:
      metrics:
        receivers:
          - prometheus
        processors:
          - memory_limiter
          - transform/cr_attribution
        exporters:
          - load_balancing
    telemetry:
      resource:
        k8s.cluster.name: "${env:K8S_CLUSTER_NAME}"
        k8s.namespace.name: "${env:K8S_NAMESPACE_NAME}"
        k8s.pod.name: "${env:K8S_POD_NAME}"
        k8s.pod.uid: "${env:K8S_POD_UID}"
        k8s.node.name: "${env:K8S_NODE_NAME}"
      metrics:
        level: normal
        readers:
          - periodic:
              interval: 10000
              timeout: 5000
              exporter:
                otlp:
                  protocol: http/protobuf
                  temporality_preference: delta
                  endpoint: http://selfmon-scraper:4318

ports:
  otlp:
    enabled: true
  otlp-http:
    enabled: true
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false
  metrics:
    enabled: false
