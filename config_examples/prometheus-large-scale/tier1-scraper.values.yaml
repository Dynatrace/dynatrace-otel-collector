# Tier 1: Scraper — scrapes Prometheus targets via TA, load-balances to tier 2.
# Deploy with:
#   helm install otel-scraper open-telemetry/opentelemetry-collector \
#     --namespace otel-ta -f tier1-scraper.values.yaml

fullnameOverride: "tiered-scraper"

podAnnotations:
  metrics.dynatrace.com/scrape: "true"
  metrics.dynatrace.com/port: "8888"

rollout:
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 0
  strategy: RollingUpdate

resources:
  requests:
    cpu: 300m
    memory: 3Gi
  limits:
    memory: 3Gi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 24
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

image:
  repository: ghcr.io/dynatrace/dynatrace-otel-collector/dynatrace-otel-collector
  # renovate: datasource=docker depName=ghcr.io/dynatrace/dynatrace-otel-collector/dynatrace-otel-collector
  tag: 0.47.0
command:
  name: dynatrace-otel-collector

mode: deployment

service:
  enabled: true
  type: ClusterIP

clusterRole:
  create: false

serviceAccount:
  create: false
  name: tiered-otel-scraper

extraEnvsFrom:
  - secretRef:
      name: dynatrace-otelcol-credentials
extraEnvs:
  - name: K8S_SERVICE_NAME
    value: "{{ include \"opentelemetry-collector.fullname\" . }}"
  - name: K8S_CLUSTER_NAME
    value: "tiered-otelcol-ta-test"
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: K8S_POD_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: K8S_NAMESPACE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
  - name: K8S_POD_UID
    valueFrom:
      fieldRef:
        fieldPath: metadata.uid

alternateConfig:
  extensions:
    health_check:
      endpoint: "${env:MY_POD_IP}:13133"

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "${env:MY_POD_IP}:4317"
        http:
          endpoint: "${env:MY_POD_IP}:4318"
    prometheus:
      config: {}
      target_allocator:
        collector_id: ${K8S_POD_NAME}
        endpoint: http://tiered-allocator-ta
        interval: 60s

  processors:
    memory_limiter:
      check_interval: 1s
      limit_percentage: 95
      spike_limit_percentage: 20
    batch/metrics: # OTLP max is 15k datapoints or 4 MiB
      send_batch_max_size: 5000
      send_batch_size: 500
      timeout: 10s

  exporters:
    debug:
      verbosity: basic
    loadbalancing:
      routing_key: "resource"
      timeout: 10s
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s
      sending_queue:
        enabled: true
        num_consumers: 10
        queue_size: 10000
      protocol:
        otlp:
          tls:
            insecure: true
          timeout: 10s
      resolver:
        k8s:
          service: "tiered-gateway.otel-ta"
          ports:
            - 4317

  service:
    extensions:
      - health_check
    pipelines:
      metrics:
        receivers:
          - otlp
          - prometheus
        processors:
          - memory_limiter
          - batch/metrics
        exporters:
          # - debug
          - loadbalancing
    telemetry:
      resource:
        k8s.cluster.name: "${env:K8S_CLUSTER_NAME}"
        k8s.namespace.name: "${env:K8S_NAMESPACE_NAME}"
        k8s.pod.name: "${env:K8S_POD_NAME}"
        k8s.pod.uid: "${env:K8S_POD_UID}"
        k8s.node.name: "${env:K8S_NODE_NAME}"
      metrics:
        level: detailed
        readers:
          - pull:
              exporter:
                prometheus:
                  host: "0.0.0.0"
                  port: 8888
                  without_type_suffix: true
                  without_units: true
      logs:
        level: INFO
        processors:
          - batch:
              exporter:
                otlp:
                  protocol: http/protobuf
                  endpoint: "${env:DT_ENDPOINT}/v1/logs"
                  headers:
                    - name: Authorization
                      value: "Api-Token ${env:DT_API_TOKEN}"

ports:
  otlp:
    enabled: true
  otlp-http:
    enabled: true
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false
  metrics:
    enabled: false
