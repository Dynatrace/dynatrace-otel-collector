extensions:
  health_check:
    endpoint: 0.0.0.0:13133
receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: 'node-exporter'
          scrape_interval: 60s
          static_configs:
            - targets: ['prometheus-node-exporter:9100']
        - job_name: opentelemetry-collector
          scrape_interval: 60s
          static_configs:
            - targets:
                - 127.0.0.1:8888
          metric_relabel_configs:
            - source_labels: [service_name]
              target_label: service.name
            - source_labels: [service_instance_id]
              target_label: service.instance.id
            - source_labels: [service_version]
              target_label: service.version
            - regex: service_name|service_instance_id|service_version
              action: labeldrop

processors:
  cumulativetodelta:
    max_staleness: 25h
  metric_start_time:

exporters:
  otlp_http:
    endpoint: ${env:DT_ENDPOINT}
    headers:
      Authorization: "Api-Token ${env:DT_API_TOKEN}"

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [metric_start_time, cumulativetodelta]
      exporters: [otlp_http]
