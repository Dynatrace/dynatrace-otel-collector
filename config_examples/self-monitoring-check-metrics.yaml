extensions:
  health_check:
    endpoint: 0.0.0.0:13133
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
  otlp/2:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
processors:
  cumulativetodelta:
  batch:
    send_batch_size: 5
    timeout: 5s
  filter:
    error_mode: ignore
    traces:
      span:
        - 'name == "app_3"'
    metrics:
      metric:
          - 'name == "my.metric" and resource.attributes["my_label"] == "abc123"'
    logs:
      log_record:
        - 'IsMatch(body, ".*password.*")'
exporters:
  debug:
    verbosity: detailed
  otlp_grpc/self:
    endpoint: 0.0.0.0:4317
    tls:
      insecure: true
  otlp_http/self:
    endpoint: http://0.0.0.0:4318
    tls:
      insecure: true
  otlp_http:
    endpoint: ${env:DT_ENDPOINT}
    headers:
      Authorization: "Api-Token ${env:API_TOKEN}"
service:
  extensions:
    - health_check
  pipelines:
    traces/self2:
      receivers: [otlp/2]
      processors: [filter, batch]
      exporters: [otlp_grpc/self]

    logs/self2:
      receivers: [otlp/2]
      processors: [filter, batch]
      exporters: [otlp_grpc/self]

    metrics/self2:
      receivers: [otlp/2]
      processors: [filter, batch]
      exporters: [otlp_grpc/self]

    traces:
      receivers: [otlp]
      processors: [filter, batch]
      exporters: [debug, otlp_http]

    logs:
      receivers: [otlp]
      processors: [filter, batch]
      exporters: [debug, otlp_http]

    metrics:
      receivers: [otlp]
      processors: [filter, cumulativetodelta, batch]
      exporters: [debug, otlp_http]
  # turn on self-monitoring
  telemetry:
    resource:
      # This section reads the previously injected environment variables
      # and attaches them to the telemetry the Collector generates about itself.
       k8s.namespace.name: "${env:MY_POD_NAMESPACE}"
       k8s.pod.name: "${env:MY_POD_NAME}"
       k8s.node.name: "${env:MY_NODE_NAME}"
    metrics:
      level: detailed
      readers:
        - periodic:
            interval: 10000
            timeout: 5000
            exporter:
              otlp:
                protocol: http/protobuf
                temporality_preference: delta
                endpoint: ${env:DT_ENDPOINT}
