extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

  prometheus/collector-self:
    config:
      scrape_configs:
        - job_name: "otel-collector"
          scrape_interval: 15s
          static_configs:
            - targets: ["localhost:8888"]

processors:
  cumulativetodelta:
  batch:
    send_batch_size: 5
    timeout: 5s
  resource/self:
    attributes:
      - key: k8s.namespace.name
        value: "${env:MY_POD_NAMESPACE}"
        action: upsert
      - key: k8s.pod.name
        value: "${env:MY_POD_NAME}"
        action: upsert
      - key: k8s.node.name
        value: "${env:MY_NODE_NAME}"
        action: upsert
      # Clean up the underscore versions created by Prometheus scrape
      - key: k8s_namespace_name
        action: delete
      - key: k8s_pod_name
        action: delete
      - key: k8s_node_name
        action: delete

exporters:
  otlp_http:
    endpoint: ${env:DT_ENDPOINT}
    headers:
      Authorization: "Api-Token ${env:API_TOKEN}"

service:
  extensions:
    - health_check
  pipelines:
    # Data pipeline: receives telemetrygen metrics, exports to DT
    metrics:
      receivers: [otlp]
      processors: [cumulativetodelta, batch]
      exporters: [otlp_http]

    # Self-monitoring: scrapes Prometheus, exports to DT
    metrics/selfmon:
      receivers: [prometheus/collector-self]
      processors: [resource/self, cumulativetodelta, batch]
      exporters: [otlp_http]

  telemetry:
    resource:
      k8s.namespace.name: "${env:MY_POD_NAMESPACE}"
      k8s.pod.name: "${env:MY_POD_NAME}"
      k8s.node.name: "${env:MY_NODE_NAME}"
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
                without_type_suffix: true
                without_units: true
