# If you must use Prometheus for self-monitoring of the collector, configure it carefully — this is NOT a recommended pattern.
# Prefer the self-monitoring.yaml configuration instead.
extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

  prometheus/collector-self:
    config:
      scrape_configs:
        - job_name: "otel-collector"
          scrape_interval: 15s
          static_configs:
            - targets: ["localhost:8888"]

processors:
  metric_start_time:
  transform/selfmon_rename:
    error_mode: ignore
    metric_statements:
      - statements:
          # Dynatrace dashboards expect attributes to be dotted, but Prometheus uses underscores.
          - replace_all_patterns(resource.attributes, "key", "_", ".")
          # Metric name renames (_ → .) via OTTL transform.
          # Rewriting __name__ in metric_relabel_configs does NOT work reliably
          # in the Collector's Prometheus receiver — the transform processor
          # is the only reliable way to rename metric names to dotted OTel conventions.
          - set(metric.name, "http.client.request.duration") where metric.name == "http_client_request_duration"
          - set(metric.name, "http.client.request.body.size") where metric.name == "http_client_request_body_size"
          - set(metric.name, "http.server.request.duration") where metric.name == "http_server_request_duration"
          - set(metric.name, "http.server.request.body.size") where metric.name == "http_server_request_body_size"
          - set(metric.name, "rpc.server.call.duration") where metric.name == "rpc_server_call_duration"
          - set(metric.name, "rpc.client.call.duration") where metric.name == "rpc_client_call_duration"
          - set(metric.name, "rpc.server.duration") where metric.name == "rpc_server_duration"
          - set(metric.name, "rpc.client.duration") where metric.name == "rpc_client_duration"

  cumulativetodelta:
    max_staleness: 25h

exporters:
  otlp_http:
    endpoint: ${env:DT_ENDPOINT}
    headers:
      Authorization: "Api-Token ${env:API_TOKEN}"
    sending_queue:
      batch:
        min_size: 5
        flush_timeout: 5s

service:
  extensions: [health_check]

  pipelines:
    metrics:
      receivers: [otlp]
      processors: [cumulativetodelta]
      exporters: [otlp_http]

    # Self-monitoring pipeline: transform must come first
    # so metric names are dotted before delta conversion
    metrics/selfmon:
      receivers: [prometheus/collector-self]
      processors: [transform/selfmon_rename, metric_start_time, cumulativetodelta]
      exporters: [otlp_http]

  telemetry:
    resource:
      k8s.namespace.name: "${env:MY_POD_NAMESPACE}"
      k8s.pod.name: "${env:MY_POD_NAME}"
      k8s.node.name: "${env:MY_NODE_NAME}"
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
                # With this configuration, otelcol_process_uptime_seconds_total
                # is exported as otelcol_process_uptime
                without_type_suffix: true
                without_units: true
