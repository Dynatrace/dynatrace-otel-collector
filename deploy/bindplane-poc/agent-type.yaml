# Agent Type definition for registering the Dynatrace OTel Collector
# as a custom distribution in BindPlane.
#
# Apply with: bindplane apply -f agent-type.yaml
# Requires organization admin permissions.
#
# This enables:
# - Configuration building restricted to components in this distribution
# - Version syncing from the GitHub releases
# - Generic installation scripts
apiVersion: bindplane.observiq.com/v1
kind: AgentType
metadata:
  name: dynatrace-otel-collector
  displayName: Dynatrace OTel Collector
  description: >-
    Dynatrace distribution of the OpenTelemetry Collector, extended with
    the OpAMP extension for BindPlane management.
spec:
  repositoryLink: https://github.com/Dynatrace/dynatrace-otel-collector
  platformArchSet:
    - platform: linux
      arch: amd64
    - platform: linux
      arch: arm64
    # Add more platforms as needed from the goreleaser config:
    # - platform: linux
    #   arch: ppc64le
    # - platform: linux
    #   arch: s390x
    # - platform: darwin
    #   arch: amd64
    # - platform: darwin
    #   arch: arm64
    # - platform: windows
    #   arch: amd64
