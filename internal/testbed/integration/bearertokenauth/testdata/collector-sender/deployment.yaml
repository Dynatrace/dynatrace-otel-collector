apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}
  namespace: e2ebearertokenauth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
      app.kubernetes.io/instance: {{ .Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetry-collector
        app.kubernetes.io/instance: {{ .Name }}
    spec:
      serviceAccountName: {{ .Name }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: collector-sender
          command:
            - /dynatrace-otel-collector
            - --config=/conf/relay.yaml
          image: "{{ .ContainerRegistry }}dynatrace-otel-collector:e2e-test"
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
          resources:
            limits:
              cpu: 128m
              memory: 256Mi
          volumeMounts:
            - mountPath: /conf
              name: opentelemetry-collector-configmap
            - mountPath: /var/run/secrets/dynatrace
              name: sa-token
              readOnly: true
            - mountPath: /tmp
              name: tmp
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: opentelemetry-collector-configmap
          configMap:
            name: {{ .Name }}-config
            items:
              - key: relay
                path: relay.yaml
        # Projected SA token with a short TTL and a custom audience that
        # matches the verifier's oidcauthextension audience configuration.
        - name: sa-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 600
                  audience: dynatrace-wif-test
        - name: tmp
          emptyDir: {}
