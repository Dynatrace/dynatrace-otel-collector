apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}
  namespace: e2ebearertokenauth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
      app.kubernetes.io/instance: {{ .Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetry-collector
        app.kubernetes.io/instance: {{ .Name }}
    spec:
      serviceAccountName: {{ .Name }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: collector-verifier
          image: otel/opentelemetry-collector-contrib:0.156.0
          args: ["--config=/conf/relay.yaml"]
          ports:
            - name: otlp-http-recv
              containerPort: 8080
              protocol: TCP
          resources:
            limits:
              cpu: 128m
              memory: 256Mi
          volumeMounts:
            - mountPath: /conf
              name: opentelemetry-collector-configmap
            - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              name: kube-api-ca
              readOnly: true
            - mountPath: /tmp
              name: tmp
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: opentelemetry-collector-configmap
          configMap:
            name: {{ .Name }}-config
            items:
              - key: relay
                path: relay.yaml
        # Cluster CA bundle used by oidcauthextension to verify TLS when
        # fetching the OIDC discovery document and JWKS from the k8s API server.
        - name: kube-api-ca
          projected:
            sources:
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
        - name: tmp
          emptyDir: {}
