# Sender collector config: reads a projected service-account token from a file
# and attaches it as a Bearer credential on the OTLP/HTTP exporter.
# This is the "WIF Phase I direct presentation" pattern.
#
# NOTE: intentionally kept in testdata/ and NOT published to config_examples/
# until WIF is generally available to customers.
extensions:
  bearertokenauth:
    filename: /var/run/secrets/dynatrace/token
    scheme: "Bearer"
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  otlphttp:
    endpoint: ${env:DT_ENDPOINT}
    auth:
      authenticator: bearertokenauth

service:
  extensions: [bearertokenauth, health_check]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlphttp]
