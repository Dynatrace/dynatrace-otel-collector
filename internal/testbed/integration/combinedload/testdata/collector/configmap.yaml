apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Name }}-config
  namespace: load-combined
data:
  relay: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 100

    exporters:
      otlp_grpc:
        endpoint: {{ .HostEndpoint }}:4327
        tls:
          insecure: true
        sending_queue: &queue_settings
          batch:
            min_size : 800
            max_size: 1000
            flush_timeout: 10s
      otlp_grpc/2:
        endpoint: {{ .HostEndpoint }}:4328
        tls:
          insecure: true
        sending_queue: *queue_settings
      otlp_grpc/3:
        endpoint: {{ .HostEndpoint }}:4329
        tls:
          insecure: true
        sending_queue: *queue_settings

    service:
      extensions:
        - health_check
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
          exporters:
            - otlp_grpc
        metrics:
          receivers:
            - otlp
          processors:
            - memory_limiter
          exporters:
            - otlp_grpc/2
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
          exporters:
            - otlp_grpc/3
