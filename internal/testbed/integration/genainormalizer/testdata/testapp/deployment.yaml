apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}-testapp
  namespace: e2egenainormalizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Name }}-testapp
  template:
    metadata:
      labels:
        app: {{ .Name }}-testapp
    spec:
      containers:
        - name: testapp
          image: "ghcr.io/dynatrace/dynatrace-otel-collector/genainormalizer-testapp:latest"
          env:
            - name: OTEL_SERVICE_NAME
              value: "test-genainormalizer-openinference"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .CollectorEndpoint }}"
          resources:
            limits:
              cpu: 128m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
