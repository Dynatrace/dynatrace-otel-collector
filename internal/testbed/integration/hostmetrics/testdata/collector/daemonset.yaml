apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Name }}
  namespace: e2ehostmetrics
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
      app.kubernetes.io/instance: {{ .Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetry-collector
        app.kubernetes.io/instance: {{ .Name }}
    spec:
      serviceAccountName: {{ .Name }}
      containers:
        - name: opentelemetry-collector
          imagePullPolicy: Never
          image: "{{ .ContainerRegistry }}dynatrace-otel-collector-journald:e2e-test"
          ports:
            - name: otlp
              containerPort: 4317
              protocol: TCP
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 3
          resources:
            limits:
              cpu: 128m
              memory: 256Mi
          volumeMounts:
            - mountPath: /conf
              name: config
            - name: run-journal
              mountPath: /run/log/journal
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 0
            capabilities:
              add:
                - DAC_READ_SEARCH
                - SYS_PTRACE
      volumes:
        - name: config
          configMap:
            name: {{ .Name }}-config
        - name: run-journal
          hostPath:
            path: /run/log/journal

