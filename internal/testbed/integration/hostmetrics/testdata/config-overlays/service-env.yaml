exporters:
  otlp_http:
    endpoint: "${env:DT_ENDPOINT}"
    headers:
      Authorization: "Api-Token ${env:DT_API_TOKEN}"
    sending_queue:
      batch:
        min_size: 3000
        max_size: 3000
        flush_timeout: 60s

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [hostmetrics/10s, hostmetrics/5m, hostmetrics/1h]
      processors: [filter, resourcedetection, transform, filter/delete-metrics, cumulativetodelta]
      exporters: [otlp_http]
    logs:
      receivers: [otlp, journald]
      processors: [resourcedetection]
      exporters: [otlp_http]
