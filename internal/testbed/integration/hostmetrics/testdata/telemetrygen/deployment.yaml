apiVersion: apps/v1
kind: Deployment
metadata:
  name: temeletrygen-deployment
  namespace: e2ehostmetrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temeletrygen-deployment
  template:
    metadata:
      annotations:
        workload: deployment
      labels:
        app: temeletrygen-deployment
    spec:
      containers:
      - command:
        - /telemetrygen
        - logs
        - --otlp-insecure
        - --otlp-endpoint=otelcolsvc.e2ehostmetrics.svc.cluster.local:4317
        - --duration=36000s
        - --rate=1
        - --batch=false
        - --otlp-attributes=service.name="test-logs-deployment"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.153.0@sha256:9e186502382ace2e5a71154af728e6b71af1cc7b1fea6a990cda2d48ce8c4d63
        imagePullPolicy: IfNotPresent
        name: telemetrygen-logs
      restartPolicy: Always
