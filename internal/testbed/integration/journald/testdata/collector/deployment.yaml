apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}
  namespace: e2ejournald
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
      app.kubernetes.io/instance: {{ .Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetry-collector
        app.kubernetes.io/instance: {{ .Name }}
    spec:
      hostPID: true
      containers:
        - name: opentelemetry-collector
          imagePullPolicy: Never
          image: "{{ .ContainerRegistry }}dynatrace-otel-collector-journald:e2e-test"
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - mountPath: /conf
              name: opentelemetry-collector-configmap
            - name: run-journal
              mountPath: /run/log/journal
              readOnly: true
      volumes:
        - name: opentelemetry-collector-configmap
          configMap:
            name: {{ .Name }}-config
            items:
              - key: relay
                path: relay.yaml
        - name: run-journal
          hostPath:
            path: /run/log/journal
