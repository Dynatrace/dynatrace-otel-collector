version: 1
signal: metrics
resources:
    - attributes:
        container.id: '*'
        container.image.name: '*'
        container.image.tag: '*'
        k8s.container.name: '*'
        k8s.namespace.name: '*'
        k8s.node.name: '*'
        k8s.pod.name: '*'
        k8s.pod.uid: '*'
      scopes:
        - name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sclusterreceiver
          version: "*"
          metrics:
            - name: k8s.container.cpu_limit
              type: gauge
              unit: '{cpu}'
            - name: k8s.container.cpu_request
              type: gauge
              unit: '{cpu}'
            - name: k8s.container.memory_limit
              type: gauge
              unit: By
            - name: k8s.container.memory_request
              type: gauge
              unit: By
            - name: k8s.container.ready
              type: gauge
            - name: k8s.container.restarts
              type: gauge
              unit: '{restart}'
    - attributes:
        k8s.daemonset.name: '*'
        k8s.daemonset.uid: '*'
        k8s.namespace.name: '*'
      scopes:
        - name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sclusterreceiver
          version: "*"
          metrics:
            - name: k8s.daemonset.current_scheduled_nodes
              type: gauge
              unit: '{node}'
            - name: k8s.daemonset.desired_scheduled_nodes
              type: gauge
              unit: '{node}'
            - name: k8s.daemonset.misscheduled_nodes
              type: gauge
              unit: '{node}'
            - name: k8s.daemonset.ready_nodes
              type: gauge
              unit: '{node}'
    - attributes:
        k8s.deployment.name: '*'
        k8s.deployment.uid: '*'
        k8s.namespace.name: '*'
      scopes:
        - name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sclusterreceiver
          version: "*"
          metrics:
            - name: k8s.deployment.available
              type: gauge
              unit: '{pod}'
            - name: k8s.deployment.desired
              type: gauge
              unit: '{pod}'
    - attributes:
        k8s.namespace.name: '*'
        k8s.namespace.uid: '*'
      scopes:
        - name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sclusterreceiver
          version: "*"
          metrics:
            - name: k8s.namespace.phase
              type: gauge
    - attributes:
        k8s.namespace.name: '*'
        k8s.node.name: '*'
        k8s.pod.name: '*'
        k8s.pod.uid: '*'
      scopes:
        - name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sclusterreceiver
          version: "*"
          metrics:
            - name: k8s.pod.phase
              type: gauge
    - attributes:
        k8s.namespace.name: '*'
        k8s.replicaset.name: '*'
        k8s.replicaset.uid: '*'
      scopes:
        - name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sclusterreceiver
          version: "*"
          metrics:
            - name: k8s.replicaset.available
              type: gauge
              unit: '{pod}'
            - name: k8s.replicaset.desired
              type: gauge
              unit: '{pod}'
    - attributes:
        k8s.node.name: '*'
        k8s.node.uid: '*'
      scopes:
        - name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sclusterreceiver
          version: "*"
          metrics:
            - name: k8s.node.allocatable_cpu
              type: gauge
              unit: '{cpu}'
            - name: k8s.node.allocatable_memory
              type: gauge
              unit: By
            - name: k8s.node.allocatable_pods
              type: gauge
              unit: '{pod}'
            - name: k8s.node.condition_ready
              type: gauge
