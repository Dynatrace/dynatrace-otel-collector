exporters:
  otlp_http/node:
    endpoint: http://%s:4321
  otlp_http/cluster:
    endpoint: http://%s:4320
  otlp_http/traces:
    endpoint: http://%s:4322
  otlp_http/logs:
    endpoint: http://%s:4319

processors:
  filter:
    error_mode: ignore
    metrics:
      metric:
        - 'IsMatch(name, "k8s.volume.*") and resource.attributes["k8s.volume.type"] == nil'
        - 'resource.attributes["k8s.volume.type"] == "emptyDir"'
        - 'resource.attributes["k8s.volume.type"] == "secret"'

service:
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - k8sattributes
        - transform
      exporters:
        - otlp_http/traces
    metrics/node:
      receivers:
        - kubeletstats
      processors:
        - filter
        - k8sattributes
        - transform
        - cumulativetodelta
      exporters:
        - otlp_http/node
    metrics:
      receivers:
        - k8s_cluster
      processors:
        - k8sattributes
        - transform
        - cumulativetodelta
      exporters:
        - otlp_http/cluster
    logs:
      receivers:
        - k8s_events
      processors:
        - transform
      exporters:
        - otlp_http/logs