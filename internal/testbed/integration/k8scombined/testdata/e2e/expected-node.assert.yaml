version: 1
signal: metrics
resources:
    - attributes:
        k8s.cluster.name: k8s-testing-cluster
        k8s.cluster.uid: '*'
        k8s.container.name: '*'
        k8s.namespace.name: '*'
        k8s.node.name: '*'
        k8s.pod.ip: '*'
        k8s.pod.name: '*'
        k8s.pod.uid: '*'
        k8s.volume.name: '*'
        k8s.volume.type: configMap
        k8s.workload.kind: daemonset
        k8s.workload.name: '*'
      scopes:
        - name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/kubeletstatsreceiver
          version: 0.48.0
          metrics:
            - name: k8s.volume.available
              type: gauge
              unit: By
            - name: k8s.volume.capacity
              type: gauge
              unit: By
            - name: k8s.volume.inodes
              type: gauge
              unit: "1"
            - name: k8s.volume.inodes.free
              type: gauge
              unit: "1"
            - name: k8s.volume.inodes.used
              type: gauge
              unit: "1"
    - attributes:
        k8s.cluster.name: k8s-testing-cluster
        k8s.cluster.uid: '*'
        k8s.container.name: '*'
        k8s.namespace.name: '*'
        k8s.node.name: '*'
        k8s.pod.ip: '*'
        k8s.pod.name: '*'
        k8s.pod.uid: '*'
        k8s.workload.kind: daemonset
        k8s.workload.name: '*'
      scopes:
        - name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/kubeletstatsreceiver
          version: 0.48.0
          metrics:
            - name: container.cpu.time
              type: sum
              unit: s
              temporality: delta
              monotonic: true
            - name: container.cpu.usage
              type: gauge
              unit: '{cpu}'
            - name: container.filesystem.available
              type: gauge
              unit: By
            - name: container.filesystem.capacity
              type: gauge
              unit: By
            - name: container.filesystem.usage
              type: gauge
              unit: By
            - name: container.memory.available
              type: gauge
              unit: By
            - name: container.memory.major_page_faults
              type: gauge
              unit: "1"
            - name: container.memory.page_faults
              type: gauge
              unit: "1"
            - name: container.memory.rss
              type: gauge
              unit: By
            - name: container.memory.usage
              type: gauge
              unit: By
            - name: container.memory.working_set
              type: gauge
              unit: By
            - name: k8s.pod.cpu.time
              type: sum
              unit: s
              temporality: delta
              monotonic: true
            - name: k8s.pod.cpu.usage
              type: gauge
              unit: '{cpu}'
            - name: k8s.pod.filesystem.available
              type: gauge
              unit: By
            - name: k8s.pod.filesystem.capacity
              type: gauge
              unit: By
            - name: k8s.pod.filesystem.usage
              type: gauge
              unit: By
            - name: k8s.pod.memory.available
              type: gauge
              unit: By
            - name: k8s.pod.memory.major_page_faults
              type: gauge
              unit: "1"
            - name: k8s.pod.memory.page_faults
              type: gauge
              unit: "1"
            - name: k8s.pod.memory.rss
              type: gauge
              unit: By
            - name: k8s.pod.memory.usage
              type: gauge
              unit: By
            - name: k8s.pod.memory.working_set
              type: gauge
              unit: By
            - name: k8s.pod.network.errors
              type: sum
              unit: "1"
              temporality: delta
              monotonic: true
              datapoints:
                - attributes:
                    direction: receive
                    interface: '*'
                - attributes:
                    direction: transmit
                    interface: '*'
            - name: k8s.pod.network.io
              type: sum
              unit: By
              temporality: delta
              monotonic: true
              datapoints:
                - attributes:
                    direction: receive
                    interface: '*'
                - attributes:
                    direction: transmit
                    interface: '*'
    - attributes:
        k8s.cluster.name: k8s-testing-cluster
        k8s.node.name: '*'
      scopes:
        - name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/kubeletstatsreceiver
          version: 0.48.0
          metrics:
            - name: k8s.node.cpu.time
              type: sum
              unit: s
              temporality: delta
              monotonic: true
            - name: k8s.node.cpu.usage
              type: gauge
              unit: '{cpu}'
            - name: k8s.node.filesystem.available
              type: gauge
              unit: By
            - name: k8s.node.filesystem.capacity
              type: gauge
              unit: By
            - name: k8s.node.filesystem.usage
              type: gauge
              unit: By
            - name: k8s.node.memory.available
              type: gauge
              unit: By
            - name: k8s.node.memory.major_page_faults
              type: gauge
              unit: "1"
            - name: k8s.node.memory.page_faults
              type: gauge
              unit: "1"
            - name: k8s.node.memory.rss
              type: gauge
              unit: By
            - name: k8s.node.memory.usage
              type: gauge
              unit: By
            - name: k8s.node.memory.working_set
              type: gauge
              unit: By
            - name: k8s.node.network.errors
              type: sum
              unit: "1"
              temporality: delta
              monotonic: true
              datapoints:
                - attributes:
                    direction: receive
                    interface: '*'
                - attributes:
                    direction: transmit
                    interface: '*'
            - name: k8s.node.network.io
              type: sum
              unit: By
              temporality: delta
              monotonic: true
              datapoints:
                - attributes:
                    direction: receive
                    interface: '*'
                - attributes:
                    direction: transmit
                    interface: '*'
