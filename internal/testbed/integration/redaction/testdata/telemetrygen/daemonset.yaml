apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Name }}-{{ .DataType }}-daemonset
  namespace: e2eredaction
spec:
  selector:
    matchLabels:
      app: {{ .Name }}-{{ .DataType }}-daemonset
  template:
    metadata:
      annotations:
        workload: daemonset
      labels:
        app: {{ .Name }}-{{ .DataType }}-daemonset
    spec:
      containers:
        - command:
            - /telemetrygen
            - {{ .DataType  }}
            - --otlp-insecure
            - --otlp-endpoint={{ .OTLPEndpoint }}
            - --duration=36000s
            - --rate=1
            - --otlp-attributes=service.name="test-{{ .DataType }}-daemonset"
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.150.0@sha256:5ab93ee0566ad12715f0560ecd22820f6a3e93f6edcec97654457c55f980542e
          name: telemetrygen
      restartPolicy: Always
