apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Name }}-{{ .DataType }}-daemonset
  namespace: e2eredaction
spec:
  selector:
    matchLabels:
      app: {{ .Name }}-{{ .DataType }}-daemonset
  template:
    metadata:
      annotations:
        workload: daemonset
      labels:
        app: {{ .Name }}-{{ .DataType }}-daemonset
    spec:
      containers:
        - command:
            - /telemetrygen
            - {{ .DataType  }}
            - --otlp-insecure
            - --otlp-endpoint={{ .OTLPEndpoint }}
            - --duration=36000s
            - --rate=1
            - --otlp-attributes=service.name="test-{{ .DataType }}-daemonset"
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.154.0@sha256:09ddc951f6b54ae4f112a746629981896d6e9d1c78495be02b866b7b261a68a4
          name: telemetrygen
      restartPolicy: Always
