apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}-{{ .DataType }}-deployment
  namespace: e2eredaction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Name }}-{{ .DataType }}-deployment
  template:
    metadata:
      annotations:
        workload: deployment
      labels:
        app: {{ .Name }}-{{ .DataType }}-deployment
    spec:
      containers:
        - command:
            - /telemetrygen
            - {{ .DataType }}
            - --otlp-insecure
            - --otlp-endpoint={{ .OTLPEndpoint }}
            - --duration=36000s
            - --rate=1
            - --otlp-attributes=service.name="test-{{ .DataType }}-deployment"
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.157.0@sha256:e84b17f92d096ecf56e1dacbddf38bade4a05b72de6a316b92a38363a2bdc13f
          imagePullPolicy: IfNotPresent
          name: telemetrygen
      restartPolicy: Always
