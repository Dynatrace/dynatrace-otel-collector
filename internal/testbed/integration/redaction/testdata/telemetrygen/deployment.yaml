apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}-{{ .DataType }}-deployment
  namespace: e2eredaction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Name }}-{{ .DataType }}-deployment
  template:
    metadata:
      annotations:
        workload: deployment
      labels:
        app: {{ .Name }}-{{ .DataType }}-deployment
    spec:
      containers:
        - command:
            - /telemetrygen
            - {{ .DataType }}
            - --otlp-insecure
            - --otlp-endpoint={{ .OTLPEndpoint }}
            - --duration=36000s
            - --rate=1
            - --otlp-attributes=service.name="test-{{ .DataType }}-deployment"
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.153.0@sha256:9e186502382ace2e5a71154af728e6b71af1cc7b1fea6a990cda2d48ce8c4d63
          imagePullPolicy: IfNotPresent
          name: telemetrygen
      restartPolicy: Always
