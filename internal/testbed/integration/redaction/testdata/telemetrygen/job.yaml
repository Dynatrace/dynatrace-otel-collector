apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Name }}-{{ .DataType}}-job
  namespace: e2eredaction
spec:
  template:
    metadata:
      annotations:
        workload: job
      labels:
        app: {{ .Name }}-{{ .DataType }}-job
    spec:
      containers:
        - command:
            - /telemetrygen
            - {{ .DataType }}
            - --otlp-insecure
            - --otlp-endpoint={{ .OTLPEndpoint }}
            - --rate=1
            - --duration=36000s
            - --otlp-attributes=service.name="test-{{ .DataType }}-job"
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.150.0@sha256:5ab93ee0566ad12715f0560ecd22820f6a3e93f6edcec97654457c55f980542e
          name: telemetrygen
      restartPolicy: OnFailure
