apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Name }}-{{ .DataType}}-job
  namespace: e2eredaction
spec:
  template:
    metadata:
      annotations:
        workload: job
      labels:
        app: {{ .Name }}-{{ .DataType }}-job
    spec:
      containers:
        - command:
            - /telemetrygen
            - {{ .DataType }}
            - --otlp-insecure
            - --otlp-endpoint={{ .OTLPEndpoint }}
            - --rate=1
            - --duration=36000s
            - --otlp-attributes=service.name="test-{{ .DataType }}-job"
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.149.0@sha256:bc690011cc541a6c1ecf494e2fe9f8398ca91ef0b83a1c3f18e521de83967183
          name: telemetrygen
      restartPolicy: OnFailure
