apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Name }}-{{ .DataType }}-statefulset
  namespace: e2eredaction
spec:
  serviceName: {{ .Name }}-{{ .DataType }}-statefulset
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Name }}-{{ .DataType }}-statefulset
  template:
    metadata:
      annotations:
        workload: statefulset
      labels:
        app: {{ .Name }}-{{ .DataType }}-statefulset
    spec:
      containers:
        - command:
            - /telemetrygen
            - {{ .DataType }}
            - --otlp-insecure
            - --otlp-endpoint={{ .OTLPEndpoint }}
            - --duration=36000s
            - --rate=1
            - --otlp-attributes=service.name="test-{{ .DataType }}-statefulset"
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.149.0@sha256:bc690011cc541a6c1ecf494e2fe9f8398ca91ef0b83a1c3f18e521de83967183
          name: telemetrygen
      restartPolicy: Always
