apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Name }}-{{ .DataType }}-statefulset
  namespace: e2eredaction
spec:
  serviceName: {{ .Name }}-{{ .DataType }}-statefulset
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Name }}-{{ .DataType }}-statefulset
  template:
    metadata:
      annotations:
        workload: statefulset
      labels:
        app: {{ .Name }}-{{ .DataType }}-statefulset
    spec:
      containers:
        - command:
            - /telemetrygen
            - {{ .DataType }}
            - --otlp-insecure
            - --otlp-endpoint={{ .OTLPEndpoint }}
            - --duration=36000s
            - --rate=1
            - --otlp-attributes=service.name="test-{{ .DataType }}-statefulset"
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.155.0@sha256:32d1762abb401e36dd8cfdf60a71075b41bd996a0cfb7c8d2e6eac4d609625b9
          name: telemetrygen
      restartPolicy: Always
