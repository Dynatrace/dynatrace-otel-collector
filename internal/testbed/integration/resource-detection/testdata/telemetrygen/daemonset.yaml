apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Name }}-{{ .DataType }}-daemonset
  namespace: e2eresourcedetection
spec:
  selector:
    matchLabels:
      app: {{ .Name }}-{{ .DataType }}-daemonset
  template:
    metadata:
      annotations:
        workload: daemonset
      labels:
        app: {{ .Name }}-{{ .DataType }}-daemonset
    spec:
      containers:
      - command:
        - /telemetrygen
        - {{ .DataType  }}
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}
        - --duration=36000s
        - --rate=1
        - --otlp-attributes=service.name="test-{{ .DataType }}-daemonset"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.151.0@sha256:04102be8071d9e0470bb28ad01ff98e19e6dafb80fb5d240ecadfd6bced84cd2
        name: telemetrygen
      restartPolicy: Always
