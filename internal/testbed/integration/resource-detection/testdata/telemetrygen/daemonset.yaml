apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Name }}-{{ .DataType }}-daemonset
  namespace: e2eresourcedetection
spec:
  selector:
    matchLabels:
      app: {{ .Name }}-{{ .DataType }}-daemonset
  template:
    metadata:
      annotations:
        workload: daemonset
      labels:
        app: {{ .Name }}-{{ .DataType }}-daemonset
    spec:
      containers:
      - command:
        - /telemetrygen
        - {{ .DataType  }}
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}
        - --duration=36000s
        - --rate=1
        - --otlp-attributes=service.name="test-{{ .DataType }}-daemonset"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.147.0@sha256:85f523b49d648fcee05c299c16f166aaf5fde39958c87da118dcb2684d675e9f
        name: telemetrygen
      restartPolicy: Always
