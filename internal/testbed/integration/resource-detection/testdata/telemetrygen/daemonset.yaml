apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Name }}-{{ .DataType }}-daemonset
  namespace: e2eresourcedetection
spec:
  selector:
    matchLabels:
      app: {{ .Name }}-{{ .DataType }}-daemonset
  template:
    metadata:
      annotations:
        workload: daemonset
      labels:
        app: {{ .Name }}-{{ .DataType }}-daemonset
    spec:
      containers:
      - command:
        - /telemetrygen
        - {{ .DataType  }}
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}
        - --duration=36000s
        - --rate=1
        - --otlp-attributes=service.name="test-{{ .DataType }}-daemonset"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.153.0@sha256:9e186502382ace2e5a71154af728e6b71af1cc7b1fea6a990cda2d48ce8c4d63
        name: telemetrygen
      restartPolicy: Always
