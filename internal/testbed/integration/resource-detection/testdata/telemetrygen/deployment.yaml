apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}-{{ .DataType }}-deployment
  namespace: e2eresourcedetection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Name }}-{{ .DataType }}-deployment
  template:
    metadata:
      annotations:
        workload: deployment
      labels:
        app: {{ .Name }}-{{ .DataType }}-deployment
    spec:
      containers:
      - command:
        - /telemetrygen
        - {{ .DataType }}
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}
        - --duration=36000s
        - --rate=1
        - --otlp-attributes=service.name="test-{{ .DataType }}-deployment"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.151.0@sha256:04102be8071d9e0470bb28ad01ff98e19e6dafb80fb5d240ecadfd6bced84cd2
        imagePullPolicy: IfNotPresent
        name: telemetrygen
      restartPolicy: Always
