apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}-{{ .DataType }}-deployment
  namespace: e2eresourcedetection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Name }}-{{ .DataType }}-deployment
  template:
    metadata:
      annotations:
        workload: deployment
      labels:
        app: {{ .Name }}-{{ .DataType }}-deployment
    spec:
      containers:
      - command:
        - /telemetrygen
        - {{ .DataType }}
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}
        - --duration=36000s
        - --rate=1
        - --otlp-attributes=service.name="test-{{ .DataType }}-deployment"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.147.0@sha256:85f523b49d648fcee05c299c16f166aaf5fde39958c87da118dcb2684d675e9f
        imagePullPolicy: IfNotPresent
        name: telemetrygen
      restartPolicy: Always
