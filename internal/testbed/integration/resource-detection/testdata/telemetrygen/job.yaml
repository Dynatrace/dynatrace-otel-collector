apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Name }}-{{ .DataType}}-job
  namespace: e2eresourcedetection
spec:
  template:
    metadata:
      annotations:
        workload: job
      labels:
        app: {{ .Name }}-{{ .DataType }}-job
    spec:
      containers:
      - command:
        - /telemetrygen
        - {{ .DataType }}
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}
        - --rate=1
        - --duration=36000s
        - --otlp-attributes=service.name="test-{{ .DataType }}-job"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.155.0@sha256:32d1762abb401e36dd8cfdf60a71075b41bd996a0cfb7c8d2e6eac4d609625b9
        name: telemetrygen
      restartPolicy: OnFailure
