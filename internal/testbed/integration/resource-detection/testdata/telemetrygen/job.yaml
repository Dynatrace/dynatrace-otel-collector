apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Name }}-{{ .DataType}}-job
  namespace: e2eresourcedetection
spec:
  template:
    metadata:
      annotations:
        workload: job
      labels:
        app: {{ .Name }}-{{ .DataType }}-job
    spec:
      containers:
      - command:
        - /telemetrygen
        - {{ .DataType }}
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}
        - --rate=1
        - --duration=36000s
        - --otlp-attributes=service.name="test-{{ .DataType }}-job"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.147.0@sha256:85f523b49d648fcee05c299c16f166aaf5fde39958c87da118dcb2684d675e9f
        name: telemetrygen
      restartPolicy: OnFailure
