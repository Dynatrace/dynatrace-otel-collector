otlp_http/traces:
  endpoint: http://%[1]s:4321
otlp_http/metrics:
  endpoint: http://%[1]s:4320
otlp_http/logs:
  endpoint: http://%[1]s:4319

service:
  extensions:
    - health_check
  pipelines:
    metrics/self:
      receivers: [ prometheus/collector-self ]
      processors: [ batch ]
      exporters: [ otlp_grpc/self ]

    traces:
      receivers: [otlp]
      processors: [ batch]
      exporters: [debug, otlp_http/traces]

    logs:
      receivers: [otlp]
      processors: [ batch]
      exporters: [debug, otlp_http/logs]

    metrics:
      receivers: [otlp]
      processors: [ cumulativetodelta, batch]
      exporters: [debug, otlp_http/metrics]

  # turn on self-monitoring
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
  