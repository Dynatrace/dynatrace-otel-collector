exporters:
  otlp_http:
    endpoint: http://%[1]s:4320
  otlp_http/selfmon:
    endpoint: http://%[1]s:4318

service:
  pipelines:
    metrics/selfmon:
      receivers: [prometheus/collector-self]
      processors: [transform/selfmon_rename, metric_start_time, cumulativetodelta]
      exporters: [otlp_http/selfmon]
