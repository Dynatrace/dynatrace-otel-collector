exporters:
  otlp_http:
    endpoint: http://%[1]s:4320
    sending_queue:
      batch:
        min_size: 5
        flush_timeout: 5s
  otlp_http/selfmon:
    endpoint: http://%[1]s:4318
    sending_queue:
      batch:
        min_size: 5
        flush_timeout: 5s

service:
  extensions: [health_check]

  pipelines:
    metrics:
      receivers: [otlp]
      processors: [cumulativetodelta]
      exporters: [otlp_http]

    # Self-monitoring pipeline: transform must come before cumulativetodelta
    # so metric names are dotted before delta conversion
    metrics/selfmon:
      receivers: [prometheus/collector-self]
      processors: [transform/selfmon_rename, cumulativetodelta]
      exporters: [otlp_http/selfmon]

  telemetry:
    resource:
      k8s.namespace.name: "${env:MY_POD_NAMESPACE}"
      k8s.pod.name: "${env:MY_POD_NAME}"
      k8s.node.name: "${env:MY_NODE_NAME}"
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
                # With this configuration, otelcol_process_uptime_seconds_total
                # is exported as otelcol_process_uptime
                without_type_suffix: true
                without_units: true
