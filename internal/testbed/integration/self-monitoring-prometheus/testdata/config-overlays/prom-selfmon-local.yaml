exporters:
  otlp_http:
    endpoint: http://%s:4320
    headers:
      Authorization: "Api-Token noop"
  otlphttp/selfmon:
    endpoint: http://%s:4318

service:
  extensions:
    - health_check

  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http]
    metrics/selfmon:
      receivers: [prometheus/selfmon]
      processors: [batch]
      exporters: [otlphttp/selfmon]

  telemetry:
    resource:
      k8s.namespace.name: "${env:MY_POD_NAMESPACE}"
      k8s.pod.name: "${env:MY_POD_NAME}"
      k8s.node.name: "${env:MY_NODE_NAME}"
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
