otlp_http:
  endpoint: ${env:DT_ENDPOINT}
  headers:
    Authorization: "Api-Token ${env:API_TOKEN}"
service:
  extensions:
    - health_check
  pipelines:

    metrics/self:
      receivers: [ prometheus/collector-self ]
      processors: [ batch ]
      exporters: [ otlp_grpc/self ]

    traces:
      receivers: [otlp]
      processors: [ batch]
      exporters: [debug, otlp_http]

    logs:
      receivers: [otlp]
      processors: [ batch]
      exporters: [debug, otlp_http]

    metrics:
      receivers: [otlp]
      processors: [ cumulativetodelta, batch]
      exporters: [debug, otlp_http]
  # turn on self-monitoring
telemetry:
  metrics:
    level: detailed
    readers:
      - pull:
          exporter:
            prometheus:
              host: "0.0.0.0"
              port: 8888
