resourceMetrics:
  - resource:
      attributes:
        - key: k8s.namespace.name
          value:
            stringValue: e2eselfmonitoringpromcheck
        - key: k8s.node.name
          value:
            stringValue: kind-control-plane
        - key: k8s.pod.name
          value:
            stringValue: otelcol-76c57a0c-7cd9c5dc66-8s5x2
        - key: server.port
          value:
            stringValue: "8888"
        - key: service.instance.id
          value:
            stringValue: da619718-590a-412c-bffa-b0af516c0b44
        - key: service.name
          value:
            stringValue: dynatrace-otel-collector
        - key: service.version
          value:
            stringValue: 0.47.0
        - key: url.scheme
          value:
            stringValue: http
    scopeMetrics:
      - metrics:
          - description: Number of distinct metadata value combinations being processed [Development]
            gauge:
              dataPoints:
                - asDouble: 2
                  attributes:
                    - key: processor
                      value:
                        stringValue: batch
                  timeUnixNano: "1000000"
            metadata:
              - key: prometheus.type
                value:
                  stringValue: gauge
            name: otelcol_processor_batch_metadata_cardinality
        scope:
          name: go.opentelemetry.io/collector/processor/batchprocessor
      - metrics:
          - description: The scraping was successful
            gauge:
              dataPoints:
                - asDouble: 1
                  timeUnixNano: "1000000"
            metadata:
              - key: prometheus.type
                value:
                  stringValue: gauge
            name: up
          - description: Duration of the scrape
            gauge:
              dataPoints:
                - asDouble: 0.00265675
                  timeUnixNano: "1000000"
            metadata:
              - key: prometheus.type
                value:
                  stringValue: gauge
            name: scrape_duration_seconds
            unit: s
          - description: The number of samples the target exposed
            gauge:
              dataPoints:
                - asDouble: 200
                  timeUnixNano: "1000000"
            metadata:
              - key: prometheus.type
                value:
                  stringValue: gauge
            name: scrape_samples_scraped
          - description: The number of samples remaining after metric relabeling was applied
            gauge:
              dataPoints:
                - asDouble: 200
                  timeUnixNano: "1000000"
            metadata:
              - key: prometheus.type
                value:
                  stringValue: gauge
            name: scrape_samples_post_metric_relabeling
          - description: The approximate number of new series in this scrape
            gauge:
              dataPoints:
                - asDouble: 200
                  timeUnixNano: "1000000"
            metadata:
              - key: prometheus.type
                value:
                  stringValue: gauge
            name: scrape_series_added
        scope:
          name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
          version: 0.47.0
      - metrics:
          - description: Fixed capacity of the retry queue (in batches). [Alpha]
            gauge:
              dataPoints:
                - asDouble: 1000
                  attributes:
                    - key: data_type
                      value:
                        stringValue: metrics
                    - key: exporter
                      value:
                        stringValue: otlp_http
                  timeUnixNano: "1000000"
                - asDouble: 1000
                  attributes:
                    - key: data_type
                      value:
                        stringValue: metrics
                    - key: exporter
                      value:
                        stringValue: otlphttp/selfmon
                  timeUnixNano: "1000000"
            metadata:
              - key: prometheus.type
                value:
                  stringValue: gauge
            name: otelcol_exporter_queue_capacity
          - description: Current size of the retry queue (in batches). [Alpha]
            gauge:
              dataPoints:
                - asDouble: 0
                  attributes:
                    - key: data_type
                      value:
                        stringValue: metrics
                    - key: exporter
                      value:
                        stringValue: otlp_http
                  timeUnixNano: "1000000"
                - asDouble: 0
                  attributes:
                    - key: data_type
                      value:
                        stringValue: metrics
                    - key: exporter
                      value:
                        stringValue: otlphttp/selfmon
                  timeUnixNano: "1000000"
            metadata:
              - key: prometheus.type
                value:
                  stringValue: gauge
            name: otelcol_exporter_queue_size
        scope:
          name: go.opentelemetry.io/collector/exporter/exporterhelper
      - metrics:
          - description: Total physical memory (resident set size) [Alpha]
            gauge:
              dataPoints:
                - asDouble: 1.02875136e+08
                  timeUnixNano: "1000000"
            metadata:
              - key: prometheus.type
                value:
                  stringValue: gauge
            name: otelcol_process_memory_rss_bytes
          - description: Bytes of allocated heap objects (see 'go doc runtime.MemStats.HeapAlloc') [Alpha]
            gauge:
              dataPoints:
                - asDouble: 1.3686504e+07
                  timeUnixNano: "1000000"
            metadata:
              - key: prometheus.type
                value:
                  stringValue: gauge
            name: otelcol_process_runtime_heap_alloc_bytes
          - description: Total bytes of memory obtained from the OS (see 'go doc runtime.MemStats.Sys') [Alpha]
            gauge:
              dataPoints:
                - asDouble: 2.7175192e+07
                  timeUnixNano: "1000000"
            metadata:
              - key: prometheus.type
                value:
                  stringValue: gauge
            name: otelcol_process_runtime_total_sys_memory_bytes
        scope:
          name: go.opentelemetry.io/collector/service
