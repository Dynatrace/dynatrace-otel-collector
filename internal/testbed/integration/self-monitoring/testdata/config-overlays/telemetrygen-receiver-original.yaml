  otlp_http:
    endpoint: ${env:DT_ENDPOINT}
    headers:
      Authorization: "Api-Token ${env:API_TOKEN}"
service:
  extensions:
    - health_check
  pipelines:
    traces/self2:
      receivers: [otlp/2]
      processors: [filter, batch]
      exporters: [otlp_grpc/self]

    logs/self2:
      receivers: [otlp/2]
      processors: [filter, batch]
      exporters: [otlp_grpc/self]

    metrics/self2:
      receivers: [otlp/2]
      processors: [filter, batch]
      exporters: [otlp_grpc/self]

    traces:
      receivers: [otlp]
      processors: [filter, batch]
      exporters: [debug, otlp_http]

    logs:
      receivers: [otlp]
      processors: [filter, batch]
      exporters: [debug, otlp_http]

    metrics:
      receivers: [otlp]
      processors: [filter, cumulativetodelta, batch]
      exporters: [debug, otlp_http]