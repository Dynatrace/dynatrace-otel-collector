  otlp_http:
    endpoint: ${env:DT_ENDPOINT}
    headers:
      Authorization: "Api-Token ${env:API_TOKEN}"
    sending_queue:
      batch:
        min_size: 5
        flush_timeout: 5s
service:
  extensions:
    - health_check
  pipelines:
    traces/self2:
      receivers: [otlp/2]
      processors: [filter]
      exporters: [otlp_grpc/self]

    logs/self2:
      receivers: [otlp/2]
      processors: [filter]
      exporters: [otlp_grpc/self]

    metrics/self2:
      receivers: [otlp/2]
      processors: [filter]
      exporters: [otlp_grpc/self]

    traces:
      receivers: [otlp]
      processors: [filter]
      exporters: [debug, otlp_http]

    logs:
      receivers: [otlp]
      processors: [filter]
      exporters: [debug, otlp_http]

    metrics:
      receivers: [otlp]
      processors: [filter, cumulativetodelta]
      exporters: [debug, otlp_http]