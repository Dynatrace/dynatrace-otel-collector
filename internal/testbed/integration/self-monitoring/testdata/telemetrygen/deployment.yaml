apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}-deployment
  namespace: e2eselfmonitoringcheckmetrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Name }}-deployment
  template:
    metadata:
      annotations:
        workload: deployment
      labels:
        app: {{ .Name }}-deployment
    spec:
      containers:
      - command:
        - /telemetrygen
        - traces
        - --otlp-http
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}:4318
        - --duration=36000s
        - --rate=1
        - --batch=false
        - --otlp-attributes=service.name="test-traces-deployment"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.147.0@sha256:85f523b49d648fcee05c299c16f166aaf5fde39958c87da118dcb2684d675e9f
        imagePullPolicy: IfNotPresent
        name: telemetrygen-traces
      - command:
        - /telemetrygen
        - metrics
        - --otlp-http
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}:4318
        - --duration=36000s
        - --rate=1
        - --batch=false
        - --otlp-attributes=service.name="test-metrics-deployment"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.147.0@sha256:85f523b49d648fcee05c299c16f166aaf5fde39958c87da118dcb2684d675e9f
        imagePullPolicy: IfNotPresent
        name: telemetrygen-metrics
      - command:
        - /telemetrygen
        - logs
        - --otlp-http
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}:4318
        - --duration=36000s
        - --rate=1
        - --batch=false
        - --otlp-attributes=service.name="test-logs-deployment"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.147.0@sha256:85f523b49d648fcee05c299c16f166aaf5fde39958c87da118dcb2684d675e9f
        imagePullPolicy: IfNotPresent
        name: telemetrygen-logs
      restartPolicy: Always
