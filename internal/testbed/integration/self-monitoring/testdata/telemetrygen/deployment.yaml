apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}-deployment
  namespace: e2eselfmonitoringcheckmetrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Name }}-deployment
  template:
    metadata:
      annotations:
        workload: deployment
      labels:
        app: {{ .Name }}-deployment
    spec:
      containers:
      - command:
        - /telemetrygen
        - traces
        - --otlp-http
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}:4318
        - --duration=36000s
        - --rate=1
        - --batch=false
        - --otlp-attributes=service.name="test-traces-deployment"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.154.0@sha256:09ddc951f6b54ae4f112a746629981896d6e9d1c78495be02b866b7b261a68a4
        imagePullPolicy: IfNotPresent
        name: telemetrygen-traces
      - command:
        - /telemetrygen
        - metrics
        - --otlp-http
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}:4318
        - --duration=36000s
        - --rate=1
        - --batch=false
        - --otlp-attributes=service.name="test-metrics-deployment"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.154.0@sha256:09ddc951f6b54ae4f112a746629981896d6e9d1c78495be02b866b7b261a68a4
        imagePullPolicy: IfNotPresent
        name: telemetrygen-metrics
      - command:
        - /telemetrygen
        - logs
        - --otlp-http
        - --otlp-insecure
        - --otlp-endpoint={{ .OTLPEndpoint }}:4318
        - --duration=36000s
        - --rate=1
        - --batch=false
        - --otlp-attributes=service.name="test-logs-deployment"
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.154.0@sha256:09ddc951f6b54ae4f112a746629981896d6e9d1c78495be02b866b7b261a68a4
        imagePullPolicy: IfNotPresent
        name: telemetrygen-logs
      restartPolicy: Always
