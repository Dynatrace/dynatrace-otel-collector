  - gomod: go.opentelemetry.io/collector/confmap/provider/httpprovider v1.61.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpsprovider v1.61.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v1.61.0
  - gomod: github.com/Dynatrace/dynatrace-otel-collector/internal/confmap/provider/eecprovider v0.0.0

replaces:
  - github.com/Dynatrace/dynatrace-otel-collector/internal/confmap/provider/eecprovider => ../internal/confmap/provider/eecprovider
